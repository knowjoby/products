<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — knowjoby</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f9f9f9;
      --bg-tertiary: rgba(0, 0, 0, 0.1);
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border: #e5e5e5;

      --color-python: #E1F5EE;
      --color-javascript: #FAEEDA;
      --color-swift: #FAECE7;
      --color-html: #E6F1FB;
      --color-default: #EEEDFE;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #0a0a0a;
        --bg-secondary: #1a1a1a;
        --bg-tertiary: rgba(255, 255, 255, 0.08);
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --text-muted: #666666;
        --border: #333333;

        --color-python: #0d3d35;
        --color-javascript: #3d3422;
        --color-swift: #3d2822;
        --color-html: #0d2240;
        --color-default: #2a2840;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      transition: background-color 0.3s, color 0.3s;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    /* Nav */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4rem;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-logo {
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--text-secondary);
    }

    /* Hero */
    .hero {
      margin-bottom: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2rem;
    }

    .hero-content {
      flex: 1;
    }

    .kicker {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .headline {
      font-family: 'Instrument Serif', serif;
      font-size: 38px;
      font-weight: 400;
      font-style: italic;
      line-height: 1.2;
      color: var(--text-primary);
    }

    .project-count {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
      padding-top: 0.5rem;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .filter-pill {
      padding: 0.5rem 0.875rem;
      border: 0.5px solid var(--border);
      border-radius: 2px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Syne', sans-serif;
    }

    .filter-pill:hover {
      border-color: var(--text-primary);
    }

    .filter-pill.active {
      background: var(--text-primary);
      color: var(--bg-primary);
      border-color: var(--text-primary);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px;
      background: var(--bg-tertiary);
      margin-bottom: 3rem;
      padding: 1px;
    }

    .card {
      background: var(--bg-primary);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      transition: background-color 0.2s;
    }

    .card:hover {
      background: var(--bg-secondary);
    }

    /* Card header with icon + arrow */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .card-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .card-arrow {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Card name */
    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      line-height: 1.3;
      word-break: break-word;
    }

    /* Card description */
    .card-description {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.6;
      flex-grow: 1;
      margin-bottom: 0.75rem;
    }

    /* Card footer */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .card-language {
      font-weight: 500;
    }

    .card-stars {
      color: var(--text-muted);
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .dots {
      display: inline-block;
    }

    .dots::after {
      content: '⋯';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: '⋯'; }
      40% { content: '⋯'; }
      60% { content: '⋯'; }
      80%, 100% { content: '⋯'; }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    /* Footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .refresh-btn {
      background: var(--text-primary);
      color: var(--bg-primary);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2px;
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .refresh-btn:hover {
      opacity: 0.8;
    }

    .refresh-btn:active {
      transform: scale(0.98);
    }

    /* Error state */
    .error {
      text-align: center;
      padding: 2rem;
      color: #d32f2f;
      font-size: 11px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 2rem 1.5rem;
      }

      .hero {
        flex-direction: column;
        gap: 1.5rem;
      }

      .headline {
        font-size: 28px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }

      footer {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Nav -->
    <nav>
      <div class="nav-logo">knowjoby</div>
      <ul class="nav-links">
        <li><a href="https://github.com/knowjoby" target="_blank">GitHub</a></li>
        <li><a href="https://www.linkedin.com/in/knowjoby/" target="_blank">LinkedIn</a></li>
        <li><a href="https://substack.com/@jobyjohn25" target="_blank">Substack</a></li>
      </ul>
    </nav>

    <!-- Hero -->
    <section class="hero">
      <div class="hero-content">
        <div class="kicker">Open Source</div>
        <h1 class="headline">built with curiosity & claude</h1>
      </div>
      <div class="project-count" id="projectCount">Loading<span class="dots"></span></div>
    </section>

    <!-- Filters -->
    <div class="filters" id="filters"></div>

    <!-- Grid -->
    <div class="grid" id="grid">
      <div class="loading">Loading<span class="dots"></span></div>
    </div>

    <!-- Footer -->
    <footer>
      <span>made with curiosity — 2025</span>
      <button class="refresh-btn" onclick="loadProjects()">↻ Refresh</button>
    </footer>
  </div>

  <script>
    const GITHUB_USER = 'knowjoby';

    // Manual tag mappings
    const REPO_TAGS = {
      'claude-usage-tracker': ['python', 'ai', 'cli'],
      'ACTI': ['javascript', 'ai', 'simulation'],
      'artificial-times': ['python', 'ai', 'agent'],
      'SubstackSaver': ['javascript', 'web', 'extension'],
      'simplenotepadformac': ['swift', 'macos'],
      'blog': ['python', 'web'],
      'products': ['html', 'web'],
      'autonomous-research-lab': ['javascript', 'ai', 'web'],
      'reading': ['html', 'web']
    };

    // Icon mappings
    const REPO_ICONS = {
      'claude-usage-tracker': '◎',
      'ACTI': '◉',
      'artificial-times': '◈',
      'SubstackSaver': '◧',
      'simplenotepadformac': '◻',
      'blog': '◫',
      'products': '◻'
    };

    // Language colors
    const LANGUAGE_COLORS = {
      'Python': { bg: 'var(--color-python)', text: '#000' },
      'JavaScript': { bg: 'var(--color-javascript)', text: '#000' },
      'Swift': { bg: 'var(--color-swift)', text: '#000' },
      'HTML': { bg: 'var(--color-html)', text: '#000' },
      'TypeScript': { bg: 'var(--color-javascript)', text: '#000' },
      'default': { bg: 'var(--color-default)', text: '#000' }
    };

    let allRepos = [];
    let allTags = new Set();

    async function loadProjects() {
      try {
        const response = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=updated&per_page=30`);
        if (!response.ok) throw new Error('Failed to fetch repos');

        allRepos = await response.json();
        allRepos = allRepos.filter(r => !r.fork);

        // Collect all tags
        allTags = new Set();
        allRepos.forEach(repo => {
          const tags = getTags(repo);
          tags.forEach(tag => allTags.add(tag));
        });

        renderFilters();
        renderProjects(allRepos);
        updateProjectCount();

      } catch (error) {
        document.getElementById('grid').innerHTML = `<div class="error">Error loading projects. Please try again.</div>`;
        console.error(error);
      }
    }

    function getTags(repo) {
      if (REPO_TAGS[repo.name]) {
        return REPO_TAGS[repo.name];
      }
      if (repo.language) {
        return [repo.language.toLowerCase()];
      }
      return [];
    }

    function getIcon(repoName) {
      return REPO_ICONS[repoName] || '◆';
    }

    function getIconColor(repoName) {
      const tags = getTags({ name: repoName, language: null });
      const firstTag = tags[0];

      if (firstTag === 'python') return LANGUAGE_COLORS['Python'];
      if (firstTag === 'javascript') return LANGUAGE_COLORS['JavaScript'];
      if (firstTag === 'swift') return LANGUAGE_COLORS['Swift'];
      if (firstTag === 'html') return LANGUAGE_COLORS['HTML'];

      return LANGUAGE_COLORS['default'];
    }

    function renderFilters() {
      const container = document.getElementById('filters');
      const sortedTags = Array.from(allTags).sort();

      let html = '<button class="filter-pill active" onclick="filterProjects(null)">All</button>';
      sortedTags.forEach(tag => {
        html += `<button class="filter-pill" onclick="filterProjects('${tag}')">${tag}</button>`;
      });

      container.innerHTML = html;
    }

    function filterProjects(tag) {
      const pills = document.querySelectorAll('.filter-pill');
      pills.forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');

      if (tag) {
        const filtered = allRepos.filter(repo => getTags(repo).includes(tag));
        renderProjects(filtered);
      } else {
        renderProjects(allRepos);
      }
    }

    function renderProjects(repos) {
      const container = document.getElementById('grid');

      if (repos.length === 0) {
        container.innerHTML = '<div class="empty-state">No projects found</div>';
        return;
      }

      container.innerHTML = repos.map(repo => {
        const color = getIconColor(repo.name);
        const tags = getTags(repo);
        const firstTag = tags[0] || 'web';

        return `
          <a href="${repo.html_url}" target="_blank" style="text-decoration: none; color: inherit;">
            <div class="card">
              <div class="card-header">
                <div class="card-icon" style="background: ${color.bg}; color: ${color.text};">
                  ${getIcon(repo.name)}
                </div>
                <div class="card-arrow">↗</div>
              </div>
              <div class="card-name">${repo.name}</div>
              <div class="card-description">${repo.description || 'No description'}</div>
              <div class="card-footer">
                <span class="card-language">${firstTag}</span>
                ${repo.stargazers_count > 0 ? `<span class="card-stars">★ ${repo.stargazers_count}</span>` : ''}
              </div>
            </div>
          </a>
        `;
      }).join('');
    }

    function updateProjectCount() {
      document.getElementById('projectCount').textContent = `${allRepos.length} projects`;
    }

    // Load on page load
    loadProjects();
  </script>
</body>
</html>
