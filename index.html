<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — knowjoby</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      line-height: 1.6;
    }

    header {
      padding: 60px 20px;
      text-align: center;
      border-bottom: 1px solid #e5e5e5;
    }

    header h1 {
      font-size: 2.2em;
      margin-bottom: 12px;
      font-weight: 700;
    }

    header p {
      font-size: 1em;
      color: #666;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .controls input {
      padding: 10px 14px;
      background: #f5f5f5;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      color: #1a1a1a;
      font-size: 0.95em;
      flex: 1;
      min-width: 250px;
      max-width: 400px;
    }

    .controls input:focus {
      outline: none;
      border-color: #000;
      background: #fafafa;
    }

    .controls button {
      padding: 10px 18px;
      background: #000;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95em;
      font-weight: 500;
    }

    .controls button:hover {
      background: #333;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .product-card {
      background: #f9f9f9;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      padding: 24px;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      background: #ffffff;
      border-color: #000;
    }

    .product-name {
      font-size: 1.2em;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .product-name a {
      color: #000;
      text-decoration: none;
    }

    .product-name a:hover {
      text-decoration: underline;
    }

    .product-description {
      color: #666;
      font-size: 0.95em;
      margin-bottom: 16px;
      flex-grow: 1;
      line-height: 1.5;
    }

    .product-meta {
      display: flex;
      gap: 16px;
      font-size: 0.85em;
      color: #999;
      margin-bottom: 16px;
      border-top: 1px solid #e5e5e5;
      padding-top: 12px;
    }

    .product-link {
      color: #000;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .product-link:hover {
      color: #666;
    }

    .filter-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      justify-content: center;
    }

    .filter-tag {
      padding: 6px 12px;
      background: #f5f5f5;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      color: #666;
      font-size: 0.85em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tag:hover {
      background: #eee;
    }

    .filter-tag.active {
      background: #000;
      color: white;
      border-color: #000;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      border-top: 1px solid #e5e5e5;
      margin-top: 60px;
    }

    footer a {
      color: #000;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8em;
      }

      .products-grid {
        grid-template-columns: 1fr;
      }

      .controls input {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Products</h1>
    <p>Open-source projects vibecoded and updated on GitHub</p>
  </header>

  <div class="container">
    <div class="controls">
      <input
        type="text"
        id="searchInput"
        placeholder="Search projects by name or description..."
      >
      <button onclick="loadProducts()">Refresh</button>
    </div>

    <div id="filters" class="filter-tags"></div>

    <div id="status" class="status"></div>
    <div id="loading" class="loading" style="display:none;">
      <div class="spinner"></div>
      <p>Loading your projects...</p>
    </div>

    <div id="products" class="products-grid"></div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <p>No projects found matching your search.</p>
    </div>
  </div>

  <footer>
    <p>Made with curiosity by <a href="https://github.com/knowjoby" target="_blank">knowjoby</a></p>
  </footer>

  <script>
    const GITHUB_USER = 'knowjoby';
    const FEATURED_REPOS = ['ACTI', 'SubstackSaver', 'claude-usage-tracker', 'simplenotepadformac', 'reading']; // Featured projects
    const LANGUAGE_COLORS = {
      'Rust': '#ce422b',
      'JavaScript': '#f1e05a',
      'TypeScript': '#3178c6',
      'Python': '#3572A5',
      'HTML': '#e34c26',
      'CSS': '#563d7c',
      'Go': '#00ADD8',
      'Java': '#b07219',
      'C++': '#f34b7d',
      'Shell': '#89e051'
    };

    let allProducts = [];
    let filteredProducts = [];

    async function loadProducts() {
      const loading = document.getElementById('loading');
      const status = document.getElementById('status');
      const products = document.getElementById('products');

      loading.style.display = 'block';
      status.textContent = '';
      products.innerHTML = '';

      try {
        const response = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=updated&per_page=100`);

        if (!response.ok) {
          throw new Error(`GitHub API error: ${response.status}`);
        }

        allProducts = await response.json();

        // Sort by updated date
        allProducts.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

        // Extract unique languages
        const languages = [...new Set(allProducts.map(r => r.language).filter(Boolean))];
        renderFilters(languages);

        // Initial render
        filterProducts();
        loading.style.display = 'none';

      } catch (error) {
        console.error('Error loading projects:', error);
        loading.style.display = 'none';
        status.textContent = `❌ Error loading projects: ${error.message}`;
      }
    }

    function renderFilters(languages) {
      const filters = document.getElementById('filters');
      filters.innerHTML = '<button class="filter-tag active" onclick="filterByLanguage(null)">All</button>';

      languages.forEach(lang => {
        if (lang) {
          const tag = document.createElement('button');
          tag.className = 'filter-tag';
          tag.textContent = lang;
          tag.onclick = () => filterByLanguage(lang);
          filters.appendChild(tag);
        }
      });
    }

    function filterByLanguage(language) {
      // Update active state
      document.querySelectorAll('.filter-tag').forEach(tag => {
        tag.classList.remove('active');
      });
      event.target.classList.add('active');

      // Filter and render
      if (language) {
        filteredProducts = allProducts.filter(r => r.language === language);
      } else {
        filteredProducts = allProducts;
      }

      renderProducts();
    }

    function filterProducts() {
      const search = document.getElementById('searchInput').value.toLowerCase();

      if (!search) {
        filteredProducts = allProducts;
      } else {
        filteredProducts = allProducts.filter(repo =>
          repo.name.toLowerCase().includes(search) ||
          (repo.description && repo.description.toLowerCase().includes(search))
        );
      }

      renderProducts();
    }

    function renderProducts() {
      const products = document.getElementById('products');
      const emptyState = document.getElementById('emptyState');

      if (filteredProducts.length === 0) {
        products.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      products.innerHTML = filteredProducts.map(repo => `
        <div class="product-card ${FEATURED_REPOS.includes(repo.name) ? 'featured' : ''}">
          <div class="product-header">
            <div class="product-name">
              <a href="${repo.html_url}" target="_blank">${repo.name}</a>
            </div>
            ${repo.stargazers_count > 0 ? `
              <div class="product-stars ${FEATURED_REPOS.includes(repo.name) ? 'featured' : ''}">
                ⭐ ${repo.stargazers_count}
              </div>
            ` : ''}
          </div>

          ${repo.description ? `
            <p class="product-description">${escapeHtml(repo.description)}</p>
          ` : ''}

          <div class="product-meta">
            ${repo.language ? `
              <div class="product-language">
                <div class="language-dot" style="background-color: ${LANGUAGE_COLORS[repo.language] || '#6b7590'}"></div>
                ${repo.language}
              </div>
            ` : ''}
            <div class="product-date">
              Updated ${formatDate(repo.updated_at)}
            </div>
          </div>

          <div class="product-footer">
            <a href="${repo.html_url}" target="_blank" class="product-link">View on GitHub →</a>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const seconds = Math.floor((now - date) / 1000);

      if (seconds < 60) return 'just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      if (seconds < 2592000) return `${Math.floor(seconds / 86400)}d ago`;

      return date.toLocaleDateString();
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', filterProducts);

    // Load on page load
    window.addEventListener('load', loadProducts);
  </script>
</body>
</html>
