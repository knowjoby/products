<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — knowjoby</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafafa;
      --fg: #111;
      --muted: #999;
      --border: #e8e8e8;
      --card-bg: #fff;
      --hover-bg: #f5f5f5;
    }

    [data-theme="dark"] {
      --bg: #111;
      --fg: #f0f0f0;
      --muted: #555;
      --border: #222;
      --card-bg: #161616;
      --hover-bg: #1e1e1e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--fg);
      transition: background 0.2s, color 0.2s;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6rem;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--fg); }

    .theme-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      transition: color 0.15s;
      padding: 0;
      line-height: 1;
    }

    .theme-btn:hover { color: var(--fg); }

    /* ── HERO ── */
    .hero {
      margin-bottom: 5rem;
    }

    .kicker {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .headline {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(40px, 7vw, 72px);
      font-weight: 400;
      font-style: italic;
      line-height: 1.1;
      color: var(--fg);
      margin-bottom: 2rem;
    }

    .stats-row {
      display: flex;
      gap: 2.5rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-value {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      font-style: italic;
      color: var(--fg);
      line-height: 1;
    }

    .stat-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .pill {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .pill:hover {
      border-color: var(--fg);
      color: var(--fg);
    }

    .pill.active {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0;
      margin-bottom: 4rem;
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }

    .grid a {
      display: flex;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .card {
      background: var(--card-bg);
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      flex: 1;
      transition: background 0.2s;
    }

    .card:hover { background: var(--hover-bg); }
    .card:hover .arrow { color: var(--fg); transform: translate(2px, -2px); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.25rem;
    }

    .card-icon {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .arrow {
      font-size: 16px;
      color: var(--muted);
      line-height: 1;
      display: inline-block;
      transition: color 0.2s, transform 0.2s;
    }

    .card-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.65;
      flex-grow: 1;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .card-tag {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-stars {
      font-size: 10px;
      color: var(--muted);
    }

    /* ── STATES ── */
    .loading, .empty {
      background: var(--card-bg);
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── FOOTER ── */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .refresh-btn {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
    }

    .refresh-btn:hover { color: var(--fg); }

    @media (max-width: 600px) {
      .headline { font-size: 32px; }
      .stats-row { gap: 1.5rem; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- NAV -->
  <nav>
    <div class="logo">knowjoby</div>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="https://github.com/knowjoby" target="_blank">GitHub</a></li>
        <li><a href="https://www.linkedin.com/in/knowjoby/" target="_blank">LinkedIn</a></li>
        <li><a href="https://substack.com/@jobyjohn25" target="_blank">Substack</a></li>
      </ul>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">◐</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <p class="kicker">Product Owner · Open Source</p>
    <h1 class="headline">built with curiosity<br>&amp; claude</h1>
    <div class="stats-row" id="stats">
      <div class="stat"><span class="stat-value" id="s-projects">—</span><span class="stat-label">Projects</span></div>
      <div class="stat"><span class="stat-value" id="s-stars">—</span><span class="stat-label">Stars</span></div>
      <div class="stat"><span class="stat-value" id="s-forks">—</span><span class="stat-label">Forks</span></div>
      <div class="stat"><span class="stat-value" id="s-years">—</span><span class="stat-label">Years active</span></div>
    </div>
  </section>

  <!-- FILTERS -->
  <div class="filters" id="filters"></div>

  <!-- GRID -->
  <div class="grid" id="grid">
    <div class="loading">Loading projects</div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span>made with curiosity — 2025</span>
    <button class="refresh-btn" onclick="load()">↻ Refresh</button>
  </footer>

</div>
<script>
  const USER = 'knowjoby';

  const CATS = {
    'claude-usage-tracker':   ['AI', 'CLI'],
    'ACTI':                   ['AI', 'Simulation'],
    'artificial-times':       ['AI', 'Agent'],
    'SubstackSaver':          ['Web', 'Extension'],
    'simplenotepadformac':    ['macOS', 'Productivity'],
    'blog':                   ['Web', 'Content'],
    'products':               ['Web'],
    'autonomous-research-lab':['AI', 'Web'],
    'reading':                ['Web', 'Content'],
    'Ai-product-managers-blog':['AI', 'Content'],
    'Claudesecagent':         ['AI'],
    'llmlab':                 ['AI', 'Learning'],
    'ghost-blogger-repo':     ['AI', 'Web'],
    'pmnotes':                ['Writing'],
  };

  const ICONS = {
    'claude-usage-tracker': '◎',
    'ACTI': '◉',
    'artificial-times': '◈',
    'SubstackSaver': '◧',
    'simplenotepadformac': '◻',
    'blog': '◫',
  };

  const LANG_BG = {
    Python:     '#E1F5EE',
    JavaScript: '#FAEEDA',
    Swift:      '#FAECE7',
    HTML:       '#E6F1FB',
  };

  let repos = [], activeFilter = null;

  // ── THEME ──
  function initTheme() {
    const saved = localStorage.getItem('theme');
    const dark  = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  }

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  }

  // ── DATA ──
  async function load() {
    document.getElementById('grid').innerHTML = '<div class="loading">Loading projects</div>';
    try {
      const r = await fetch(`https://api.github.com/users/${USER}/repos?sort=updated&per_page=30`);
      const EXCLUDE = [
        'skills-scale-institutional-knowledge-using-copilot-spaces',
        'skills-getting-started-with-github-copilot',
        'products',
        'substack-charts',
        'substack-prompt-generator',
        'badomainlearning',
        'llmlab',
        'ghost-blogger-repo',
        'blog',
        'Claudesecagent',
        'Ai-product-managers-blog',
      ];
      repos = (await r.json()).filter(x => !x.fork && !EXCLUDE.includes(x.name));

      const totalStars  = repos.reduce((s, r) => s + r.stargazers_count, 0);
      const totalForks  = repos.reduce((s, r) => s + r.forks_count, 0);
      const oldest      = repos.reduce((a, b) => new Date(a.created_at) < new Date(b.created_at) ? a : b);
      const years       = Math.max(1, Math.floor((Date.now() - new Date(oldest.created_at)) / (365.25 * 864e5)));

      document.getElementById('s-projects').textContent = repos.length;
      document.getElementById('s-stars').textContent    = totalStars;
      document.getElementById('s-forks').textContent    = totalForks;
      document.getElementById('s-years').textContent    = years;

      buildFilters();
      render(repos);
    } catch(e) {
      document.getElementById('grid').innerHTML = '<div class="loading">Failed to load — try refreshing</div>';
    }
  }

  function cats(repo) { return CATS[repo.name] || [repo.language || 'Other']; }

  function buildFilters() {
    const all = new Set();
    repos.forEach(r => cats(r).forEach(c => all.add(c)));

    const sorted = [...all].sort();
    document.getElementById('filters').innerHTML =
      `<button class="pill active" onclick="filter(null, this)">All</button>` +
      sorted.map(c => `<button class="pill" onclick="filter('${c}', this)">${c}</button>`).join('');
  }

  function filter(cat, el) {
    activeFilter = cat;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    render(cat ? repos.filter(r => cats(r).includes(cat)) : repos);
  }

  function render(list) {
    if (!list.length) {
      document.getElementById('grid').innerHTML = '<div class="empty">No projects found</div>';
      return;
    }

    document.getElementById('grid').innerHTML = list.map(repo => {
      const bg   = LANG_BG[repo.language] || '#EEEDFE';
      const icon = ICONS[repo.name] || '◆';
      const tag  = cats(repo)[0];

      return `
        <a href="${repo.html_url}" target="_blank">
          <div class="card">
            <div class="card-top">
              <div class="card-icon" style="background:${bg}">${icon}</div>
              <span class="arrow">↗</span>
            </div>
            <div class="card-name">${repo.name}</div>
            ${repo.description ? `<div class="card-desc">${repo.description}</div>` : ''}
            <div class="card-bottom">
              <span class="card-tag">${tag}</span>
              ${repo.stargazers_count ? `<span class="card-stars">★ ${repo.stargazers_count}</span>` : ''}
            </div>
          </div>
        </a>`;
    }).join('');
  }

  initTheme();
  load();
</script>
</body>
</html>
